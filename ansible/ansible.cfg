[defaults]
# Self-hosters copy inventory/example to inventory/<name> and point at it
# with -i inventory/<name> (or change this default). The example ships in
# the repo; real inventories (carrying a SOPS-encrypted vault.sops.yml) are
# gitignored.
inventory = inventory/example
roles_path = roles
collections_path = collections
# ansible_managed is set as a regular variable in skel/group_vars/all/main.yml.example
# (not here — the ansible.cfg setting is deprecated in ansible-core 2.23+).
# Lookup plugins live at playbooks/lookup_plugins/ and are auto-discovered
# by Ansible from playbook_dir — no explicit lookup_plugins= setting needed.
# Silence deprecation warnings from third-party modules we can't fix
# (e.g. ansible.builtin.authorized_key importing from _text.to_native).
# Our own deprecation issues (ansible_facts[] accessor, ansible_managed
# variable) are already fixed in our code.
deprecation_warnings = False
host_key_checking = True
retry_files_enabled = False
# In ansible-core 2.13+ the YAML-formatted stdout uses the built-in default
# callback plus result_format. The legacy `community.general.yaml` callback
# that older docs reference was removed in community.general 12.0.0.
stdout_callback = default
result_format = yaml
forks = 10
interpreter_python = auto_silent
# Keep .example files out of inventory parsing (the scaffold ships
# hosts.yml.example alongside gitignored hosts.yml).
inventory_ignore_extensions = ~, .orig, .bak, .ini, .cfg, .retry, .pyc, .pyo, .example, .md
# Secrets are SOPS-encrypted with age (replaces ansible-vault). Group/host
# vault files use the `.sops.yml` extension (e.g.
# inventory/dev/group_vars/all/vault.sops.yml) and are auto-decrypted by
# the community.sops vars plugin enabled below. The operator's age key
# is resolved via the $SOPS_AGE_KEY env var (raw key content; paste into
# the calling shell once per session). Recipients are pinned in the
# repo-root .sops.yaml and the inventories submodule's .sops.yaml.
# See internal_docs/operator/data-security-overview.md for the full setup.
vars_plugins_enabled = host_group_vars, community.sops.sops

[inventory]
# Disable the 'script' inventory plugin. Same reason as above — on a filesystem
# that force-marks every file executable, Ansible's script plugin tries to
# exec YAML inventory files and fails with "Exec format error" before the
# yaml/auto plugins get a chance.
enable_plugins = host_list, auto, yaml, ini, toml

# Keep module code off the target's disk — piped to Python on stdin.
# This is the primary "no script leakage to VPS" knob.
[ssh_connection]
pipelining = True
control_path = ~/.ansible/cp/%%h-%%p-%%r
# StrictHostKeyChecking=accept-new: trust new hosts on first contact (TOFU),
# but STILL error on key mismatch for known hosts. This handles first contact
# for key-auth plays (site.yml first-time against tailnet name, migrations).
# For password-auth bootstrap, Ansible has its own guard that refuses password
# auth when the host isn't in known_hosts — bootstrap.yml handles that with a
# TOFU pre-play that ssh-keyscans the host into known_hosts before Phase 1.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new

[persistent_connection]
command_timeout = 60
