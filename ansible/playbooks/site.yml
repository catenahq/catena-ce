---
# Main converge. Safe to re-run. Runs over Tailscale.
#
# This file is a single atomic unit (one converge), with no cross-playbook
# imports. Composition (preflight + site + validate) lives in the
# installer/CLI, which runs preflight as its own invocation before this.
# Direct invocation runs site alone.
#
# Usage (cwd = ansible/):
#   ansible-playbook -i inventory/example playbooks/site.yml --limit host1

- name: Converge VPS to desired state
  # `stage_hosts` lets a wrapper target a specific host/group via
  # import_playbook + vars. Direct invocation with `--limit` still uses
  # the `vps:` group default.
  hosts: "{{ stage_hosts | default('vps') }}"
  become: true
  gather_facts: true

  # ─── Fail-fast external-service reachability ───────────────────────────
  # Probe every configured external backend the converge depends on BEFORE
  # any heavy role runs, so a dead / unreachable / misconfigured endpoint
  # fails the install in ~10s with a clear message -- not 10-30 min in when
  # the backup role finally writes (a restic-repo-unreachable converge once
  # took 29 min to surface). Probes run ON the VPS (where the backup / mail
  # traffic actually originates), so they catch VM-side network blocks a
  # controller-side check would miss. Values come from the inventory `.env`
  # (dotenv), not role defaults (out of scope in pre_tasks). Bypass for
  # offline dev with -e skip_external_preflight=true.
  pre_tasks:
    - name: "Preflight (external): probe configured S3 backends (HEAD, 10s)"
      ansible.builtin.uri:
        url: "{{ item.url }}"
        method: HEAD
        timeout: 10
        validate_certs: false
      register: _ext_s3
      failed_when: false # never fail per-probe; the assert below fails once, clearly
      changed_when: false
      loop: >-
        {{ [
             {'name': 'BACKUP_RESTIC_REPO',
              'url': (lookup('dotenv', 'BACKUP_RESTIC_REPO', default='')
                      | restic_repo_endpoint)},
             {'name': 'BACKUP_WORM_REPO',
              'url': (lookup('dotenv', 'BACKUP_WORM_REPO', default='')
                      | restic_repo_endpoint)},
             {'name': 'NEXTCLOUD_WORM_REPO',
              'url': (lookup('dotenv', 'NEXTCLOUD_WORM_REPO', default='')
                      | restic_repo_endpoint)},
           ] | selectattr('url', 'ne', '') | list }}
      loop_control:
        label: "{{ item.name }} -> {{ item.url }}"
      when: not (skip_external_preflight | default(false) | bool)
      tags: [always, external_preflight]

    - name: "Preflight (external): fail fast if any S3 backend is unreachable"
      ansible.builtin.fail:
        msg: |
          External S3 backend(s) unreachable from {{ inventory_hostname }}.
          Failing the install NOW instead of 10-30 min into the converge:
          {% for r in _ext_s3.results | default([]) if (r.status | default(-1)) == -1 %}
            - {{ r.item.name }} ({{ r.item.url }}): {{ r.msg | default('connection failed') }}
          {% endfor %}
          Check the endpoint URL, credentials, region, and network/firewall,
          then re-run. To bypass (NOT recommended): -e skip_external_preflight=true
      when:
        - not (skip_external_preflight | default(false) | bool)
        - _ext_s3.results | default([]) | selectattr('status', 'defined')
          | selectattr('status', 'equalto', -1) | list | length > 0
      tags: [always, external_preflight]

    - name: "Preflight (external): SMTP relay reachable (TCP, 10s)"
      ansible.builtin.wait_for:
        host: "{{ _smtp_host }}"
        port: "{{ _smtp_port | int }}"
        timeout: 10
        state: started
        msg: >-
          SMTP relay {{ _smtp_host }}:{{ _smtp_port }} (SMTP_HOST/SMTP_PORT)
          did not accept a connection within 10s. Keycloak + alert mail would
          fail later in the converge; fix the relay host/port or network, or
          re-run with -e skip_external_preflight=true.
      vars:
        _smtp_host: "{{ lookup('dotenv', 'SMTP_HOST', default='') }}"
        _smtp_port: "{{ lookup('dotenv', 'SMTP_PORT', default='587') }}"
      when:
        - not (skip_external_preflight | default(false) | bool)
        - (lookup('dotenv', 'SMTP_HOST', default='') | length) > 0
      tags: [always, external_preflight]

  # Tags allow iterating on a single role:
  #   ansible-playbook -i inventory/example playbooks/site.yml --limit host1 --tags storage
  # Preflight runs as its own ansible-playbook invocation (the installer
  # runs it first); tag filters here never skip it.
  # Each role's tag matches its name; ufw_lockdown has its own tag so it only
  # runs in a full converge (otherwise it re-probes tailscale0 unnecessarily).
  roles:
    - { role: common, tags: [common] }
    # Anti-container-escape kernel hardening. MUST run after common (needs
    # python3-apt) and BEFORE docker (so /etc/sysctl.d/ files are in place
    # before dockerd's first start; otherwise dockerd's runtime /proc/sys
    # writes win until next boot, leaving Day-1 vs reboot-recovery state
    # divergent). See roles/host_hardening/README.md for the full var-set
    # rationale.
    - { role: host_hardening, tags: [host_hardening, hardening] }
    - { role: tailscale, tags: [tailscale] }
    - { role: storage, tags: [storage] } # mount block volume at /mnt/data (+ optional bulk)
    - { role: docker, tags: [docker] }
    - { role: dokploy, tags: [dokploy] } # app platform, bound to tailscale0 only
    # cloudflared swarm service + CF tunnel + wildcard DNS. Runs BEFORE
    # keycloak + oauth2_proxy so the public auth.<zone> URL is reachable
    # by the time oauth2_proxy waits for Keycloak's OIDC discovery doc.
    # Without this ordering, a fresh-target converge would fail in a
    # single-pass site.yml (CF 530 from oauth2_proxy's wait task).
    # Idempotent: subsequent converges find the tunnel + DNS + service
    # already in the desired state and no-op.
    - { role: cloudflare_tunnel, tags: [cloudflare_tunnel, cloudflare] } # CF tunnel + DNS + cloudflared swarm service
    # Keycloak MUST come before oauth2_proxy so its realm exists before
    # oauth2_proxy registers its OIDC client via keycloak-config-cli. Both
    # MUST come before infrastructure so the gated apps' forward-auth chain
    # (rendered by oauth2_proxy) is in place when infrastructure deploys
    # those apps with their Traefik routes.
    - { role: keycloak, tags: [keycloak, auth] } # SSO IdP
    - { role: oauth2_proxy, tags: [oauth2_proxy, auth] } # forward-auth gateway: staff + admin instances
    - { role: infrastructure, tags: [infrastructure] } # recovery archive, gated apps (Gatus, Healthchecks, ...), dashboard-sync, gatus-sync
    # catena-admin host-side state -- runner user, dispatcher, action
    # catalog, bind-mount targets. The Go shell container is deployed via
    # Dokploy's git-source flow; this role only manages the host
    # prerequisites.
    - { role: catena-admin, tags: [catena_admin] }
    - { role: coturn, tags: [coturn] } # shared TURN/STUN for NC Talk HPB + RC Jitsi (UDP media plane, direct on VPS public IP)
    - { role: backup, tags: [backup] } # restic + the manual oneshot catena-backup.service

  post_tasks:
    # ─── Dokploy admin-domain ────────────────────────────────────────────
    # Configures Dokploy's "Web Server" domain so origin validation passes
    # when accessing via admin.<zone>. Single canonical caller. Runs AFTER
    # all roles so dokploy-postgres + the dokploy app are healthy.
    # Idempotent: re-runs are no-ops once the host record matches.
    #
    # Retry-through-restart: end-of-play handlers (docker: restart docker,
    # fired when the docker role freshly dropped daemon.json on a first/
    # single-pass install) bounce the whole swarm right before post_tasks,
    # so dokploy :3000 is briefly Connection-refused while swarm reschedules
    # the task. Without a wait this post_task races that reconverge and
    # fails. Retry until the API answers 200. (A two-pass install masks this
    # because pass-2 leaves daemon.json unchanged -> no restart handler.)
    - name: "Dokploy API: set admin domain"
      ansible.builtin.uri:
        url: "{{ dokploy_api_base }}/settings.assignDomainServer"
        method: POST
        headers:
          x-api-key: "{{ vault_dokploy_api_key }}"
        body_format: json
        body:
          host: "{{ dokploy_admin_hostname }}"
          certificateType: "none"
          https: false
        status_code: 200
      register: _dok_set_domain
      retries: 30
      delay: 5
      until: _dok_set_domain.status | default(-1) == 200
      delegate_to: localhost
      become: false
      when:
        - vault_dokploy_api_key is defined
        - vault_dokploy_api_key | length > 10
      tags: [post_admin_domain]

    - name: "Note -- admin domain not set (no API key yet)"
      ansible.builtin.debug:
        msg: >-
          Skipped setting admin domain -- vault_dokploy_api_key not in vault yet.
          After creating your admin account at http://{{ ansible_host }}:{{ dokploy_port }},
          generate an API key (Settings -> Profile), add it to the vault as
          vault_dokploy_api_key, and re-run the installer (or:
          ansible-playbook playbooks/site.yml --limit {{ inventory_hostname }}).
      when: vault_dokploy_api_key is not defined or (vault_dokploy_api_key | length) < 10
      tags: [post_admin_domain]

    # Reconcile the declarative public-port registry. Runs AFTER every role
    # has dropped its /etc/catena/public-ports.d/ fragment + deployed its
    # containers (vps.expose.* labels), so the merged effective set is
    # complete. Applies ufw + DOCKER-USER rules and writes the effective set
    # read by validate.yml. The timer + docker drop-in keep it current at
    # runtime; this is the converge-time anchor.
    - name: "Public ports: reconcile firewall from registry"
      ansible.builtin.systemd_service:
        name: catena-public-ports.service
        state: started
      changed_when: false
      tags: [public_ports]

    # Final lockdown. Must come AFTER tailscale + infrastructure are healthy,
    # otherwise we lock ourselves out.
    - name: Lock ufw to tailscale-only ingress
      ansible.builtin.include_role:
        name: common
        tasks_from: ufw_lockdown.yml
        # apply: propagates tags to every task inside ufw_lockdown.yml.
        # Without it, `--tags lockdown` would fire the include but then
        # filter out all the inner tasks (they have no "lockdown" tag).
        apply:
          tags: [lockdown]
      tags: [lockdown]

# Post-converge validation runs as its own ansible-playbook invocation
# (playbooks/validate.yml), composed by the installer/CLI after this
# converge. A failed validate still fails the overall run.
#
# The post-restore multi-app redeploy + pg-replay coupling is a
# Business-edition lane and is not part of the Community converge.
