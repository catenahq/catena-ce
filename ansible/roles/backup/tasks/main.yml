---
# Dispatcher -- backup_mode picks which subfile to run. These are all
# restore/backup MECHANISMS (fair-code); the Business edition adds the
# scheduling (timer -- dropped here) and the multi-app post-restore
# ORCHESTRATION (post_restore_redeploy.yml, which lives in the private
# repo and drives the mechanisms below in dependency order).
#   install   (default, site.yml path) -- install binaries, unit files,
#             the manual oneshot service, and the initial snapshot
#   verify    (verify-backup.yml)      -- dry-restore + assert
#   restore   (restore.yml playbook)   -- filesystem restore from restic
#   pg_replay (pg_replay.yml) -- replay pg_dumpall into running postgres
#             containers. dokploy-postgres is EXCLUDED from the raw restic
#             set, so scope=dokploy is the ONLY restore path for the
#             Dokploy control DB -- the dokploy role calls it directly
#             (scope=dokploy) on a post-restore converge. scope=clients
#             is driven by the Business post-restore orchestration.
#   s3_reconcile (s3_reconcile.yml) -- post-restore DB<->S3 reference
#             reconcile; driven by the Business post-restore orchestration.

- name: Assert backup_mode is valid
  ansible.builtin.assert:
    that:
      - backup_mode in ['install', 'verify', 'restore', 'pg_replay', 's3_reconcile']
    fail_msg: "backup_mode must be install | verify | restore | pg_replay | s3_reconcile (got: {{ backup_mode }})"

- name: Assert restic credentials are in vault
  ansible.builtin.assert:
    that:
      - vault_backup_restic_password is defined
      - vault_backup_s3_access_key is defined
      - vault_backup_s3_secret_key is defined
      - backup_restic_repo | length > 0
    fail_msg: >-
      Restic credentials must be in vault and BACKUP_RESTIC_REPO must be set
      in inventory/<name>/.env before the backup role can run.
      See inventory/example/group_vars/all/vault.yml.example for the schema
      (the encrypted live file is vault.sops.yml).

- name: Install backup infrastructure
  ansible.builtin.include_tasks: install.yml
  when: backup_mode == 'install'

- name: Verify restic repo is restorable (dry-restore drill)
  ansible.builtin.include_tasks: verify.yml
  when: backup_mode == 'verify'

- name: Restore from backup
  ansible.builtin.include_tasks: restore.yml
  when: backup_mode == 'restore'

- name: Replay pg_dumpall into running postgres containers
  ansible.builtin.include_tasks: pg_replay.yml
  when: backup_mode == 'pg_replay'

- name: Reconcile DB <-> S3 references
  ansible.builtin.include_tasks: s3_reconcile.yml
  when: backup_mode == 's3_reconcile'
