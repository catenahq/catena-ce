---
# Validation tasks for roles/backup. Replaces tests/goss/backup.yaml.
- name: "validate/backup: backup timer is-active + is-enabled"
  # Timer units are not always enumerated by ansible.builtin.service_facts
  # depending on version; use systemctl directly for deterministic
  # results. Same pattern as the ufw/ssh command probes in common.
  ansible.builtin.command: "systemctl {{ item }} catena-backup.timer"  # noqa: command-instead-of-module
  register: _bk_timer_checks
  loop: [is-active, is-enabled]
  failed_when: false
  changed_when: false

- name: "validate/backup: timer state valid"
  ansible.builtin.assert:
    that:
      - (_bk_timer_checks.results[0].stdout | trim) == 'active'
      - (_bk_timer_checks.results[1].stdout | trim) == 'enabled'
    fail_msg: >-
      catena-backup.timer not armed:
      is-active={{ _bk_timer_checks.results[0].stdout | trim }},
      is-enabled={{ _bk_timer_checks.results[1].stdout | trim }}

- name: "validate/backup: fixture files exist + correct mode"
  ansible.builtin.include_role:
    name: common
    tasks_from: _assert_path_perms
  vars:
    _assert_paths:
      - { path: /etc/systemd/system/catena-backup.service }
      - { path: /etc/systemd/system/catena-backup.timer }
      - { path: /usr/local/bin/run-backup.sh, mode: "0750" }
      - { path: /usr/local/bin/restic, mode: "0755" }
      - { path: /usr/local/bin/catena-disk-preflight, mode: "0755" }

- name: "validate/backup: restic can reach the repo"
  # End-to-end reachability check: cat config decrypts the repo header,
  # failing cleanly on wrong password, unreachable bucket, or missing
  # credentials. Doesn't require any snapshots to exist.
  ansible.builtin.command:
    argv:
      - "{{ backup_restic_env_script }}"
      - restic
      - cat
      - config
  register: _bk_restic_cat
  failed_when: false
  changed_when: false

- name: "validate/backup: restic cat config exited 0"
  ansible.builtin.assert:
    that:
      - _bk_restic_cat.rc == 0
    fail_msg: "restic cat config failed (rc={{ _bk_restic_cat.rc }}, stderr={{ _bk_restic_cat.stderr }})"
