---
# Validation tasks for roles/backup. Replaces tests/goss/backup.yaml.
#
# Community ships the backup oneshot service PLUS exactly one timer: a
# single daily backup (catena-backup.timer). Sub-daily cadence + the
# catena-daily orchestrator chain are the Business lane -- on a Business
# host the EE engine MASKS catena-backup.timer and schedules itself, so
# this validate only asserts the units exist; it does NOT assert the
# timer is enabled (it is legitimately masked on Business).
- name: "validate/backup: fixture files exist + correct mode"
  ansible.builtin.include_role:
    name: common
    tasks_from: _assert_path_perms
  vars:
    _assert_paths:
      - { path: /etc/systemd/system/catena-backup.service }
      - { path: /etc/systemd/system/catena-backup.timer }
      - { path: /usr/local/bin/run-backup.sh, mode: "0750" }
      - { path: /usr/local/bin/restic, mode: "0755" }
      - { path: /usr/local/bin/catena-disk-preflight, mode: "0755" }

- name: "validate/backup: restic can reach the repo"
  # End-to-end reachability check: cat config decrypts the repo header,
  # failing cleanly on wrong password, unreachable bucket, or missing
  # credentials. Doesn't require any snapshots to exist.
  ansible.builtin.command:
    argv:
      - "{{ backup_restic_env_script }}"
      - restic
      - cat
      - config
  register: _bk_restic_cat
  failed_when: false
  changed_when: false

- name: "validate/backup: restic cat config exited 0"
  ansible.builtin.assert:
    that:
      - _bk_restic_cat.rc == 0
    fail_msg: "restic cat config failed (rc={{ _bk_restic_cat.rc }}, stderr={{ _bk_restic_cat.stderr }})"
