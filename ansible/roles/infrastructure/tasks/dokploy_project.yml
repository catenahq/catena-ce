---
# Find-or-create the "{{ dokploy_project_name }}" Dokploy project and
# capture its ID + the default environment's ID.
#
# Dokploy's project.create auto-creates a "production" environment -- do NOT
# call environment.create, or you get duplicates. We re-read project.all
# afterwards to capture the environmentId.
#
# Sets facts used by dokploy_compose.yml:
#   _dokploy_project_id
#   _dokploy_environment_id

- name: "Dokploy: list projects"
  ansible.builtin.uri:
    url: "{{ dokploy_api_base }}/project.all"
    method: GET
    headers:
      x-api-key: "{{ vault_dokploy_api_key }}"
    status_code: 200
    return_content: true
  register: _dokploy_projects
  delegate_to: localhost
  become: false
  # The Dokploy API (swarm service on :3000) can be momentarily down when
  # this role runs -- e.g. a `--tags infrastructure` converge right after a
  # heavy template deploy + swarm churn, or the first-converge pg-password
  # rotation restarting the dokploy task. When the dokploy role's own
  # readiness gate did not run first (tag-filtered runs), the very first API
  # call here would otherwise fail with "Connection refused". Wait for the
  # API to come back instead of failing the whole converge. ~2.5 min budget
  # covers a dokploy restart; a genuine outage still surfaces after it.
  retries: 30
  delay: 5
  until: _dokploy_projects.status == 200

- name: "Dokploy: find existing project ({{ dokploy_project_name }})"
  ansible.builtin.set_fact:
    _dokploy_existing_project: >-
      {{
        _dokploy_projects.json
        | selectattr('name', 'equalto', dokploy_project_name)
        | list
        | first
        | default(None)
      }}

- name: "Dokploy: create project ({{ dokploy_project_name }})"
  ansible.builtin.uri:
    url: "{{ dokploy_api_base }}/project.create"
    method: POST
    headers:
      x-api-key: "{{ vault_dokploy_api_key }}"
    body_format: json
    body:
      name: "{{ dokploy_project_name }}"
      description: >-
        OPERATOR-MANAGED. All composes and catalog env vars in this
        project are overwritten on every operator converge. Do not edit
        composes here directly -- file an operator request. (Unknown
        env keys not in the catalog ARE preserved across converges
        via merge_env, but catalog keys always reset.)
      env: ""
    status_code: [200, 201]
  when: _dokploy_existing_project is none
  delegate_to: localhost
  become: false

- name: "Dokploy: re-read project list (capture environmentId post-create)"
  ansible.builtin.uri:
    url: "{{ dokploy_api_base }}/project.all"
    method: GET
    headers:
      x-api-key: "{{ vault_dokploy_api_key }}"
    status_code: 200
    return_content: true
  register: _dokploy_projects_after
  delegate_to: localhost
  become: false
  when: _dokploy_existing_project is none

- name: "Dokploy: capture project + environment IDs"
  ansible.builtin.set_fact:
    _dokploy_project: >-
      {{
        (_dokploy_projects_after.json
          if _dokploy_existing_project is none
          else _dokploy_projects.json)
        | selectattr('name', 'equalto', dokploy_project_name)
        | list
        | first
      }}

- name: "Dokploy: resolve environmentId (first environment of project)"
  ansible.builtin.set_fact:
    _dokploy_project_id: "{{ _dokploy_project.projectId }}"
    _dokploy_environment_id: "{{ _dokploy_project.environments[0].environmentId }}"

- name: "Dokploy: project ready"
  ansible.builtin.debug:
    msg: >-
      Dokploy project '{{ dokploy_project_name }}' ready
      (projectId={{ _dokploy_project_id }},
       environmentId={{ _dokploy_environment_id }})
