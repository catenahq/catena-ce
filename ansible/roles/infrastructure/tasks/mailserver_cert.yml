---
# TLS cert lifecycle for the self-hosted mailserver (mail.<zone>).
# Clones the roles/coturn cert pattern: Let's Encrypt DNS-01 against the
# Cloudflare API (cloudflared owns port 80, so HTTP-01 is out),
# certbot.timer for renewal, and a deploy hook that injects the cert into
# the dms container and reloads Postfix + Dovecot without dropping
# connections.
#
# Unlike coturn (which bind-mounts /etc/letsencrypt and SIGHUPs), the
# mailserver template runs SSL_TYPE=manual with cert paths under the
# mounted mail-config volume (/tmp/docker-mailserver/custom-certs/), so
# we `docker cp` the cert in -- the same injection mechanism
# mailserver_oidc.yml uses for the Dovecot/Roundcube config. DMS's own
# Let's Encrypt mode is NOT used (it needs port 80).
#
# Opt-in template: every task is gated on the dms container existing, so
# this whole file no-ops on a tenant that never deployed the mailserver.

- name: "Mailserver cert: locate dms container"
  ansible.builtin.shell: |
    set -o pipefail
    docker ps --filter label=com.docker.compose.service=dms \
      --format '{{ "{{" }}.Names{{ "}}" }}' | head -n1
  args:
    executable: /bin/bash
  register: _ms_cert_dms
  changed_when: false

- name: "Mailserver cert: skip when mailserver template not deployed"
  ansible.builtin.debug:
    msg: >-
      mailserver template not deployed (no dms container); skipping TLS
      cert issuance for {{ mailserver_hostname }}.
  when: (_ms_cert_dms.stdout | default('') | length) == 0

- name: "Mailserver cert: issue + inject (only when dms is deployed)"
  when: (_ms_cert_dms.stdout | default('') | length) > 0
  block:
    - name: "Mailserver cert: install certbot + Cloudflare DNS plugin"
      ansible.builtin.apt:
        name:
          - certbot
          - python3-certbot-dns-cloudflare
        state: present
        update_cache: true
        cache_valid_time: 3600
      retries: 3
      delay: 10
      register: _ms_cert_apt
      until: _ms_cert_apt is succeeded

    - name: "Mailserver cert: render Cloudflare credentials file"
      ansible.builtin.copy:
        content: |
          # Managed by catena roles/infrastructure mailserver_cert.yml -- do not edit.
          dns_cloudflare_api_token = {{ vault_cloudflare_api_token }}
        dest: "{{ mailserver_cloudflare_creds_path }}"
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: "Mailserver cert: ensure renewal-hooks/deploy/ + /etc/catena exist"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - /etc/letsencrypt/renewal-hooks/deploy
        - /etc/catena

    # Per-host config for the deploy hook. The hook is a plain script
    # (no Jinja, per repo policy); it sources this env file.
    - name: "Mailserver cert: render deploy-hook env file"
      ansible.builtin.template:
        src: mailserver-cert.env.j2
        dest: /etc/catena/mailserver-cert.env
        owner: root
        group: root
        mode: "0644"

    - name: "Mailserver cert: install certbot deploy hook (plain script)"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../scripts/mailserver-cert-reload.sh"
        dest: /etc/letsencrypt/renewal-hooks/deploy/mailserver-reload.sh
        owner: root
        group: root
        mode: "0755"

    - name: "Mailserver cert: check if cert already exists"
      ansible.builtin.stat:
        path: "{{ mailserver_cert_live_dir }}/fullchain.pem"
      register: _ms_cert_stat

    # Bench local-CA (Pebble) wiring. No-op in production (the
    # CATENA_ACME_* knobs are blank), so certbot issues against Let's
    # Encrypt exactly as before. When the bench points at its host-side
    # Pebble ACME server, certbot must (a) resolve the `pebble` hostname
    # baked into Pebble's endpoint cert SAN to the Pebble host IP, and
    # (b) trust the extracted minica via REQUESTS_CA_BUNDLE. See
    # test_bench/orchestrator/pebble.py.
    - name: "Mailserver cert: map Pebble ACME host (bench local CA)"
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '[[:space:]]pebble$'
        line: "{{ mailserver_acme_host_ip }} pebble"
        state: present
      when:
        - (mailserver_acme_directory_url | length) > 0
        - (mailserver_acme_host_ip | length) > 0

    - name: "Mailserver cert: install Pebble CA bundle (bench local CA)"
      ansible.builtin.copy:
        content: "{{ mailserver_acme_ca_bundle_b64 | b64decode }}"
        dest: "{{ mailserver_acme_ca_bundle_path }}"
        owner: root
        group: root
        mode: "0644"
      when: (mailserver_acme_ca_bundle_b64 | length) > 0

    # First-issuance path. Idempotent: certbot's own state in
    # /etc/letsencrypt/renewal/<host>.conf prevents duplicate orders;
    # re-running on an issued cert is a near-no-op. Wide retry envelope
    # for transient Boulder/staging hiccups (same rationale as coturn).
    - name: "Mailserver cert: issue cert via DNS-01 (first run)"
      ansible.builtin.command:
        argv: >-
          {{
            ['certbot', 'certonly',
             '--non-interactive', '--agree-tos',
             '--email', mailserver_certbot_email,
             '--dns-cloudflare',
             '--dns-cloudflare-credentials', mailserver_cloudflare_creds_path,
             '--dns-cloudflare-propagation-seconds', '30']
            + (['--server', mailserver_acme_server]
               if (mailserver_acme_server | length) > 0 else [])
            + ['-d', mailserver_hostname]
          }}
      # REQUESTS_CA_BUNDLE makes certbot trust the bench Pebble endpoint's
      # minica; empty dict in production = certbot uses the system trust
      # store against Let's Encrypt, unchanged.
      environment: "{{ {'REQUESTS_CA_BUNDLE': mailserver_acme_ca_bundle_path}
                       if (mailserver_acme_ca_bundle_b64 | length) > 0 else {} }}"
      register: _ms_cert_issue
      when: not _ms_cert_stat.stat.exists
      changed_when: _ms_cert_issue.rc == 0
      retries: 5
      delay: 60
      until: _ms_cert_issue is succeeded

    - name: "Mailserver cert: confirm cert is now present"
      ansible.builtin.stat:
        path: "{{ mailserver_cert_live_dir }}/fullchain.pem"
      register: _ms_cert_after
      failed_when: not _ms_cert_after.stat.exists

    - name: "Mailserver cert: enable certbot.timer for renewal"
      ansible.builtin.systemd:
        name: certbot.timer
        enabled: true
        state: started

    # Run the deploy hook now so first-issuance lands in the dms
    # container immediately (the renewal hook otherwise only fires on
    # future renewals). Idempotent: docker cp overwrites with identical
    # bytes, reload is cheap.
    # Inject the cert into the dms config volume (docker cp) + reload. With
    # SSL_TYPE=manual the cert is a hard boot gate, but the container is in
    # its stable account-wait window at this point (no mailbox yet -- the
    # mailserver_accounts task runs AFTER this), so the docker cp lands
    # reliably and the cert persists in the volume. The account task then
    # unblocks the boot, which proceeds to the TLS gate with the cert
    # already here -- no restart needed (a restart here would only re-enter
    # the account-wait, since no mailbox exists yet).
    - name: "Mailserver cert: inject cert into dms now + reload"
      ansible.builtin.command:
        argv: [/etc/letsencrypt/renewal-hooks/deploy/mailserver-reload.sh]
      register: _ms_cert_inject
      changed_when: "'reloaded' in (_ms_cert_inject.stdout | default(''))"
