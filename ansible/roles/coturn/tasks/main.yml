---
# Shared TURN/STUN server. Deployed as a direct swarm service (not via
# Dokploy compose) because coturn is infrastructure -- it needs host
# networking for ICE-candidate advertisement and is not an
# operator-managed app. Mirrors the cloudflared swarm-service pattern
# in roles/cloudflare_tunnel/tasks/main.yml.

- name: "coturn: preflight vault keys"
  ansible.builtin.assert:
    that:
      - vault_turn_static_auth_secret is defined
      - vault_turn_static_auth_secret | length >= 32
    fail_msg: >-
      vault_turn_static_auth_secret missing or too short. Mint a 32+ char
      secret and set it in inventory/<name>/group_vars/all/vault.sops.yml
      (the installer mints it for you on a fresh install).

- name: "coturn: preflight public_ip"
  ansible.builtin.assert:
    that:
      - public_ip is defined
      - public_ip | length > 0
    fail_msg: >-
      public_ip is unset on this host. Coturn advertises this in ICE
      candidates; without it every relayed call fails. Set public_ip on
      the host in inventory/<name>/hosts.yml.

# ── Step 1: declare public ports (registry) ───────────────────────────
# UDP media plane lives on the public IP -- coturn does not ride the
# cloudflared TCP tunnel. Instead of hand-writing ufw rules here, declare
# the ports as a registry fragment; the public-port reconciler (installed
# by roles/common) applies the ufw rules and records them in the effective
# set read by validation. host-bound (swarm --network=host), scope=any.
- name: "coturn: ensure public-port fragment dir exists"
  ansible.builtin.file:
    path: "{{ public_ports_fragment_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "coturn: declare public ports (registry fragment)"
  ansible.builtin.copy:
    dest: "{{ public_ports_fragment_dir }}/coturn.json"
    owner: root
    group: root
    mode: "0644"
    content: |
      {{
        [
          {"proto": "udp", "port": coturn_listen_port,
           "scope": "any", "bind": "host", "owner": "coturn",
           "comment": "STUN / plain TURN"},
          {"proto": "tcp", "port": coturn_tls_port,
           "scope": "any", "bind": "host", "owner": "coturn",
           "comment": "TLS-TURN (TCP)"},
          {"proto": "udp", "port": coturn_tls_port,
           "scope": "any", "bind": "host", "owner": "coturn",
           "comment": "TLS-TURN (UDP)"},
          {"proto": "udp",
           "port": coturn_min_relay_port ~ '-' ~ coturn_max_relay_port,
           "scope": "any", "bind": "host", "owner": "coturn",
           "comment": "media relay range"}
        ] | to_nice_json
      }}
  register: _coturn_ports_fragment

# Apply immediately so this converge does not leave a window where the
# media ports are firewalled off until the post_tasks reconcile. The
# reconciler is idempotent; the post_tasks run reconciles the full set.
- name: "coturn: reconcile public ports now (fragment changed)"
  ansible.builtin.systemd_service:
    name: catena-public-ports.service
    state: started
  changed_when: false
  when: _coturn_ports_fragment.changed

# ── Step 2: DNS A record (gray-cloud) ─────────────────────────────────
- name: "coturn: ensure turn.<zone> A record points at VPS public IP"
  ansible.builtin.import_tasks: dns.yml
  tags: [coturn_dns]

# ── Step 3: cert via DNS-01 (Cloudflare) ─────────────────────────────
- name: "coturn: ensure cert path exists"
  ansible.builtin.import_tasks: cert.yml
  tags: [coturn_cert]

# ── Step 4: render turnserver.conf ──────────────────────────────────
- name: "coturn: ensure config dir exists"
  ansible.builtin.file:
    path: "{{ coturn_host_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "coturn: render turnserver.conf"
  ansible.builtin.template:
    src: turnserver.conf.j2
    dest: "{{ coturn_host_config_path }}"
    owner: root
    group: root
    mode: "0640"
  register: _coturn_conf
  # Template renders vault_turn_static_auth_secret. With --diff, ansible
  # prints the rendered diff; no_log: true prevents the secret from
  # surfacing in that output.
  no_log: true

# ── Step 5: deploy coturn as a swarm service ────────────────────────
# Pattern mirrors cloudflared (roles/cloudflare_tunnel/tasks/
# main.yml lines 220-277): inspect for existence, create on first run,
# update env / image otherwise. Host networking so external-ip in
# turnserver.conf matches a real interface.

- name: "coturn: check if swarm service exists"
  ansible.builtin.command: docker service inspect coturn --format '{{ "{{" }}.ID{{ "}}" }}'
  register: _coturn_service
  changed_when: false
  failed_when: false

- name: "coturn: create swarm service (first run)"
  # --user 0:0: the official coturn images (alpine + debian variants)
  # ship USER coturn (non-root). certbot drops the privkey as
  # root:root 0600 under /etc/letsencrypt/archive/<host>/, which the
  # bind-mount preserves. Non-root coturn cannot read it -> TLS
  # listener silently fails to bind (port 5349 never appears in
  # `ss`) and the service falls back to STUN-only on 3478, masking
  # the failure until validate.yml catches it. Container is the
  # security boundary (--network=host already grants full host
  # network), so running coturn as root inside is fine and matches
  # the upstream Docker compose example.
  ansible.builtin.command:
    argv:
      - docker
      - service
      - create
      - --name=coturn
      - --mode=global
      - --network=host
      - --user=0:0
      - --restart-condition=any
      - "--mount=type=bind,source={{ coturn_host_config_path }},target=/etc/coturn/turnserver.conf,readonly"
      # Mount the entire /etc/letsencrypt subtree (not just live/<host>/)
      # so the relative symlinks under live/<host>/* -> ../../archive/...
      # resolve inside the container. See defaults/main.yml for the
      # full rationale.
      - "--mount=type=bind,source={{ coturn_host_letsencrypt_dir }},target={{ coturn_container_letsencrypt_dir }},readonly"
      - "{{ coturn_image }}"
      - "-c"
      - "/etc/coturn/turnserver.conf"
  when: _coturn_service.rc != 0

- name: "coturn: read current container user (drift check)"
  ansible.builtin.command: docker service inspect coturn --format '{{ "{{" }}.Spec.TaskTemplate.ContainerSpec.User{{ "}}" }}'
  register: _coturn_current_user
  changed_when: false
  when: _coturn_service.rc == 0

- name: "coturn: reconcile container user to root (existing service)"
  # Existing services created before the --user=0:0 fix landed get
  # rolled to root so the TLS listener actually binds.
  ansible.builtin.command:
    argv:
      - docker
      - service
      - update
      - --user=0:0
      - coturn
  when:
    - _coturn_service.rc == 0
    - (_coturn_current_user.stdout | default('') | trim) != "0:0"
  changed_when: true

- name: "coturn: read current image (drift check)"
  ansible.builtin.command: docker service inspect coturn --format '{{ "{{" }}.Spec.TaskTemplate.ContainerSpec.Image{{ "}}" }}'
  register: _coturn_current_image
  changed_when: false
  when: _coturn_service.rc == 0

- name: "coturn: reconcile image to configured pin"
  ansible.builtin.command:
    argv:
      - docker
      - service
      - update
      - "--image={{ coturn_image }}"
      - coturn
  when:
    - _coturn_service.rc == 0
    - (_coturn_current_image.stdout | default('')).split('@')[0] != coturn_image
  changed_when: true

- name: "coturn: SIGHUP on config / cert change (graceful reload)"
  # Coturn re-reads cert + config on SIGHUP without dropping calls in
  # progress. The deploy hook on the certbot timer (cert.yml) does the
  # same thing post-renewal; this branch handles config changes from
  # converge time (e.g. operator bumped coturn_min_relay_port).
  ansible.builtin.shell: |
    set -o pipefail
    for ct in $(docker ps --filter "name=coturn" --format '{{ "{{" }}.Names{{ "}}" }}'); do
      docker kill --signal=HUP "$ct" || true
    done
  args:
    executable: /bin/bash
  when:
    - _coturn_service.rc == 0
    - _coturn_conf.changed
  changed_when: true
