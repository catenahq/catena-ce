---
# CANONICAL writer for the dokploy postgres password.
#
# Vault is the source of truth; the swarm secret
# `dokploy_postgres_password` AND the postgres `dokploy` role's
# pg_authid hash are caches that this file keeps in lockstep.
#
# Drift modes this file fixes:
#   1. Vault rotated; swarm secret + pg_authid still hold old value
#      -> rotate swarm secret + ALTER ROLE pg_authid to vault value
#   2. Raw-volume restore brought back snapshot-time pg_authid hashes
#      -> ALTER ROLE pg_authid to vault value (vault + swarm secret
#        already in sync; only pg_authid is stale)
#   3. First install: install.sh just generated a random swarm secret
#      and initdb'd pg_authid from it, both differing from vault
#      -> rotate swarm secret + ALTER ROLE pg_authid to vault value
#
# Idempotent. No-op when vault == swarm secret == pg_authid.
#
# Hard ops constraints (per project policy):
#   - Every blocking docker call wrapped in `timeout` -- no unbounded
#     waits. NEVER `docker service scale` (synchronous-blocking-on-
#     converge call that hung the rollback drill).
#   - Single canonical writer of this state -- no parallel paths.
#     This file is the ONLY place the swarm secret + pg_authid get
#     written from the converge flow.
#   - End-to-end probe at the end is the load-bearing assertion: it
#     spawns a one-shot client on dokploy-network and authenticates
#     as `dokploy` over TCP using PGPASSWORD=$VAULT_PW. Same path
#     dokploy uses. Pass = dokploy will authenticate. Fail = abort
#     the play with a clear message.

- name: "pg-password: assert vault value present + non-placeholder"
  ansible.builtin.assert:
    that:
      - vault_dokploy_postgres_password is defined
      - vault_dokploy_postgres_password | length >= 12
      - vault_dokploy_postgres_password not in ['REPLACE', 'REPLACE-LONG-RANDOM-STRING']
    fail_msg: >-
      vault_dokploy_postgres_password is missing or a placeholder. Run
      `./catena --fresh-install` (it auto-generates via
      helpers/seed.py), or set manually in
      inventory/<name>/group_vars/all/vault.sops.yml.

- name: "pg-password: detect swarm state"
  ansible.builtin.command: docker info --format '{{ "{{" }}.Swarm.LocalNodeState{{ "}}" }}'
  register: _pg_reconcile_swarm
  changed_when: false
  failed_when: false

- name: "pg-password: log skip when swarm not yet active"
  ansible.builtin.debug:
    msg: >-
      pg_password_reconcile skipped -- swarm is not active yet (state
      = {{ _pg_reconcile_swarm.stdout | default('?') | trim }}). The
      reconciler runs after install.sh has initialized swarm; on a
      truly fresh install this branch fires once and the next step
      (install.sh) brings swarm up. Re-converge picks it up.
  when: (_pg_reconcile_swarm.stdout | default('') | trim) != 'active'

# Wrapped in block/always so /var/log/catena-pg-reconcile.log is
# slurped + printed to the Ansible output whether the inner shell
# succeeds or fails. Without this, no_log: true on the shell hides
# stdout entirely, and a failure followed by VM teardown (test_bench
# end-cleanup) leaves the operator with zero diagnostics. The log
# file is written by the script via `exec > >(tee -a $LOG)` and
# contains only log() status lines, never the vault password.
- name: "pg-password: reconcile + surface log on any outcome"
  when: (_pg_reconcile_swarm.stdout | default('') | trim) == 'active'
  block:
    - name: "pg-password: reconcile (single shell block; bounded ops; idempotent)"
      # All branching lives in one shell block so the state machine is
      # readable end-to-end. Every blocking docker call is wrapped in
      # `timeout`; every wait loop has a bounded iteration count.
      # no_log hides the env (which holds the vault value); the always-
      # block below surfaces /var/log/catena-pg-reconcile.log on
      # both success and failure (log() status lines only).
      ansible.builtin.shell:
        # `{% raw %}...{% endraw %}` disables Jinja templating for the
        # whole script body. Without it Ansible parses every `{{.Names}}`
        # / `{{.CurrentState}}` Go-template (used by `docker --format`)
        # as a Jinja expression and aborts at task-load time with
        # "unexpected '.'". The script never references Ansible vars
        # inline -- the only one we need (the vault password) flows
        # through the `environment:` dict below, which IS Jinja-
        # templated separately.
        cmd: |
          {% raw %}
          set -u
          # Tee all output to a file the operator can read after a
          # no_log task failure (the registered stdout is censored when
          # no_log is on; this gives us a recoverable log without
          # leaking the env).
          LOG=/var/log/catena-pg-reconcile.log
          exec > >(tee -a "$LOG") 2> >(tee -a "$LOG" >&2)
          printf '\n=== %s reconcile run ===\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$LOG"
          VAULT_PW="$VAULT_PW"
          SECRET=dokploy_postgres_password
          LABEL=catena_sha256
          SVC=dokploy
          PG_SVC=dokploy-postgres
          PROBE_IMAGE=postgres:16
          PROBE_NETWORK=dokploy-network
          changed=0

          log() { echo "[pg_reconcile] $*"; }

          # Hash of the vault value, used as a swarm-secret label so
          # we can detect drift WITHOUT a running consumer (docker
          # secrets are write-once at the API; the value is only
          # readable from a container that mounts the secret file).
          # SHA256 is one-way, so the label leaks no information
          # beyond what `docker secret inspect` callers already trust.
          VAULT_HASH=$(printf '%s' "$VAULT_PW" | sha256sum | awk '{print $1}')

          # Resolve a swarm service name to its first running
          # container name (or empty if no task is running). Returns
          # one line on stdout -- safe to capture in $(...). Bounded
          # by `timeout 5` so a hung docker daemon can't stall
          # callers indefinitely.
          first_task() {
              timeout 5 docker ps --filter "name=^$1\\." --filter status=running --format '{{.Names}}' | head -1
          }

          # Bounded wait for a swarm service to have N running tasks.
          # 60 iters * 2s = 2 min. Returns 0 on convergence, 1 on
          # timeout. `docker service ps` is a metadata RPC against
          # the local docker daemon (typically returns in ms);
          # wrapping each iteration in `timeout 5` keeps a hung-
          # daemon edge case from stalling the whole loop past the
          # iteration budget.
          wait_for_replicas() {
              svc="$1"
              want="$2"
              for _ in $(seq 1 60); do
                  got=$(timeout 5 docker service ps "$svc" --filter desired-state=running --format '{{.CurrentState}}' 2>/dev/null | grep -c '^Running' || true)
                  [ "$got" = "$want" ] && return 0
                  sleep 2
              done
              return 1
          }

          # Bounded wait for dokploy HTTP to answer with a 2xx/3xx.
          # 60 iters * 2s = 2 min. Budget covers the worst case: a
          # first-install secret-swap. Phase 2 ALTERs pg_authid to
          # the vault value before Phase 4 swaps the mounted secret,
          # so in the gap between them dokploy is auth-failing and
          # may enter swarm's crash-restart-backoff. Once the secret
          # swaps, the task comes out of backoff + boots + serves
          # :3000 in 30-90 s on the Incus test bench. The previous
          # 6-min budget was sized for a DR-specific crash loop that
          # no longer happens: the dokploy-postgres volume is now
          # excluded from restic, so DR walks the same fresh-install
          # path and there's no install.sh-vs-restored-volume skew.
          wait_for_dokploy_http() {
              for _ in $(seq 1 60); do
                  code=$(curl -fsS -o /dev/null -w '%{http_code}' \
                           "http://localhost:3000" 2>/dev/null \
                           || echo 000)
                  case "$code" in
                      200|301|302|307|308) return 0 ;;
                  esac
                  sleep 2
              done
              return 1
          }

          # Inline of get_active_secret_name (the helper itself is
          # defined below in Phase 3 -- we need an early peek to drive
          # the Phase 1 guard, so duplicate the docker call here.
          # Don't pull the helper up: Phase 3's later call still uses
          # the same name + has its own context comments).
          _peek_active_secret() {
              local secrets_path='.Spec.TaskTemplate.ContainerSpec.Secrets'
              local mount='/run/secrets/postgres_password'
              local fmt='{{ range '"$secrets_path"' }}{{ if eq .File.Name "'"$mount"'" }}{{ .SecretName }} {{ end }}{{ end }}'
              timeout 5 docker service inspect "$1" --format "$fmt" 2>/dev/null | awk '{print $1}'
          }

          # --- Phase 1: ensure SOMETHING provides the secret to consumers ---
          # First-install only path: if NO swarm consumer is mounting
          # any secret at /run/secrets/postgres_password, pre-seed the
          # canonical name so install.sh sees it (would otherwise
          # generate a random value). On every other run this is a
          # no-op.
          #
          # Guard on "any consumer mounts SOMETHING" rather than "the
          # literal canonical-name secret exists": Phase 4 of a prior
          # run rotates to a hash-suffixed name AND removes the old
          # canonical-name secret, so a subsequent idempotency rerun
          # would otherwise re-pre-seed the canonical name even though
          # the hash-suffixed secret is the live one (creates an
          # orphan + reports `changed` for an idempotent rerun).
          existing_mount=$(_peek_active_secret "$SVC")
          if [ -z "$existing_mount" ] && ! timeout 10 docker secret inspect "$SECRET" >/dev/null 2>&1; then
              log "CHANGED: pre-seeding $SECRET from vault (first install path)"
              if ! printf '%s' "$VAULT_PW" | timeout 10 docker secret create --label "$LABEL=$VAULT_HASH" "$SECRET" - >/dev/null; then
                  log "FAIL: docker secret create $SECRET" >&2
                  exit 1
              fi
              changed=1
          fi

          # --- Phase 2: ALTER ROLE pg_authid to vault value (idempotent) ---
          # Always runs FIRST, before any secret swap, so by the time
          # consumers restart with the new secret value (Phase 4)
          # they authenticate against pg_authid that already matches.
          # Protects against:
          #   - install.sh-era random pg_authid (pre-existing hosts
          #     where vault had drifted from install.sh's random)
          #   - Raw-volume restore (snapshot-time pg_authid hashes
          #     baked in)
          # Applying ALTER ROLE to the same value is a SQL no-op
          # (postgres rewrites the row, no observable effect).
          pg_consumer=$(first_task "$PG_SVC")
          if [ -z "$pg_consumer" ]; then
              log "FAIL: no running $PG_SVC task; cannot ALTER ROLE" >&2
              exit 1
          fi
          ready=0
          for _ in $(seq 1 30); do
              if timeout 5 docker exec "$pg_consumer" pg_isready -U dokploy >/dev/null 2>&1; then
                  ready=1
                  break
              fi
              sleep 2
          done
          if [ "$ready" -ne 1 ]; then
              log "FAIL: $pg_consumer not pg_isready within 60s" >&2
              exit 1
          fi
          # SQL via stdin (here-string): psql's `:'pw'` literal-
          # quoting substitution is unreliable when supplied via -c
          # on the postgres image we ship; only stdin works (proven
          # during the 2026-04-23 incident).
          if ! timeout 30 docker exec -i \
                  -e VAULT_PW="$VAULT_PW" \
                  "$pg_consumer" \
                  sh -c 'exec psql -U dokploy -d postgres -v ON_ERROR_STOP=1 -v pw="$VAULT_PW"' \
                  <<<"ALTER ROLE dokploy WITH PASSWORD :'pw';" >/dev/null; then
              log "FAIL: ALTER ROLE dokploy WITH PASSWORD" >&2
              exit 1
          fi
          log "OK: ALTER ROLE dokploy WITH PASSWORD applied"

          # --- Phase 3: detect drift via secret label ---
          # Read the secret currently mounted in the dokploy service
          # spec (most authoritative consumer). Compare its label to
          # vault SHA256. Works regardless of dokploy's runtime state
          # -- the spec is queryable even when tasks are crash-
          # looping. SHA256 label is one-way; leaks no information.
          get_active_secret_name() {
              local secrets_path='.Spec.TaskTemplate.ContainerSpec.Secrets'
              local mount='/run/secrets/postgres_password'
              local fmt='{{ range '"$secrets_path"' }}{{ if eq .File.Name "'"$mount"'" }}{{ .SecretName }} {{ end }}{{ end }}'
              timeout 5 docker service inspect "$1" --format "$fmt" 2>/dev/null | awk '{print $1}'
          }
          active_secret=$(get_active_secret_name "$SVC")
          drifted=0
          if [ -z "$active_secret" ]; then
              log "INFO: no active secret reference on $SVC; skipping drift swap"
          else
              current_label=$(timeout 5 docker secret inspect "$active_secret" --format '{{ index .Spec.Labels "catena_sha256" }}' 2>/dev/null || true)
              if [ "$current_label" != "$VAULT_HASH" ]; then
                  drifted=1
                  if [ -z "$current_label" ]; then
                      log "DRIFT: active secret $active_secret has no vault-hash label (pre-reconciler era) -- will swap"
                  else
                      log "DRIFT: active secret $active_secret label != vault SHA256 -- will swap"
                  fi
              else
                  log "OK: active secret $active_secret matches vault (by SHA256 label)"
              fi
          fi

          # --- Phase 4: rotate via versioned-secret swap ---
          # Why versioned (not in-place rm+create): docker secrets
          # are immutable AND can't be removed while in use by ANY
          # service. Both `dokploy` and `dokploy-postgres` reference
          # the secret; in-place rotation would require scaling both
          # to 0 (taking the DB offline AND breaking ALTER ROLE for
          # next time). Versioned swap creates a NEW secret with a
          # hash-suffixed name, uses --secret-rm + --secret-add to
          # atomically swap the reference on each consumer (rolling
          # restart with the new secret mounted), then removes the
          # old secret.
          if [ "$drifted" = 1 ]; then
              new_secret="${SECRET}_v$(printf '%s' "$VAULT_HASH" | cut -c1-8)"
              # Idempotent create -- re-running with the same vault
              # value finds the same versioned name + skips create.
              if ! timeout 5 docker secret inspect "$new_secret" >/dev/null 2>&1; then
                  log "ROTATE: creating versioned secret $new_secret"
                  if ! printf '%s' "$VAULT_PW" | timeout 10 docker secret create --label "$LABEL=$VAULT_HASH" "$new_secret" - >/dev/null; then
                      log "FAIL: docker secret create $new_secret" >&2
                      exit 1
                  fi
              fi
              # Find every service currently referencing the OLD
              # secret name (same target path). Hardcoding
              # (dokploy-postgres, dokploy) was tempting but fragile
              # -- anyone adding a third consumer would silently
              # break the rotation.
              consumers=""
              secret_names_fmt='{{ range .Spec.TaskTemplate.ContainerSpec.Secrets }}{{ .SecretName }} {{ end }}'
              for svc in $(timeout 10 docker service ls --format '{{.Name}}' 2>/dev/null); do
                  ref=$(timeout 5 docker service inspect "$svc" --format "$secret_names_fmt" 2>/dev/null \
                          | tr ' ' '\n' | grep -Fx "$active_secret" || true)
                  if [ -n "$ref" ]; then
                      consumers="$consumers $svc"
                  fi
              done
              if [ -z "$consumers" ]; then
                  log "WARN: no service references $active_secret; nothing to swap"
              fi
              # Swap on each consumer. Order: dokploy-postgres first
              # so that by the time dokploy restarts with the new
              # secret, the DB is up + reachable.
              # Self-heal: if a consumer is at 0 desired-replicas
              # (left over from a prior failed reconciler that
              # scaled down for an in-place rotation), include
              # `--replicas 1` so the swap also brings it back up.
              # Skip the heal when desired already >= 1 -- that
              # would clobber a deliberate multi-replica setup.
              for svc in $consumers; do
                  log "ROTATE: swapping secret on $svc ($active_secret -> $new_secret)"
                  desired=$(timeout 5 docker service inspect "$svc" --format '{{.Spec.Mode.Replicated.Replicas}}' 2>/dev/null || echo 0)
                  extra=""
                  if [ "$desired" = "0" ] || [ -z "$desired" ]; then
                      log "ROTATE: $svc is at 0 desired-replicas -- adding --replicas 1 to the swap (self-heal)"
                      extra="--replicas 1"
                  fi
                  # shellcheck disable=SC2086 # $extra is intentionally
                  # word-split so empty stays empty + non-empty becomes
                  # two argv tokens (--replicas, 1).
                  secret_add="source=$new_secret,target=/run/secrets/postgres_password,mode=0444"
                  if ! timeout 60 docker service update --detach $extra \
                          --secret-rm "$active_secret" --secret-add "$secret_add" \
                          "$svc" >/dev/null; then
                      log "FAIL: docker service update --secret-rm/add for $svc" >&2
                      exit 1
                  fi
              done
              # Wait for each consumer to converge with the new secret.
              for svc in $consumers; do
                  if ! wait_for_replicas "$svc" 1; then
                      log "FAIL: $svc did not converge to 1 replica after secret swap" >&2
                      exit 1
                  fi
              done
              if echo " $consumers " | grep -q " $SVC "; then
                  if ! wait_for_dokploy_http; then
                      log "FAIL: $SVC not reachable on :3000 after secret swap" >&2
                      log "---- diag: docker service ps $SVC --no-trunc ----" >&2
                      timeout 10 docker service ps "$SVC" --no-trunc >&2 2>&1 || true
                      log "---- diag: docker service ps $PG_SVC --no-trunc ----" >&2
                      timeout 10 docker service ps "$PG_SVC" --no-trunc >&2 2>&1 || true
                      log "---- diag: docker service logs $SVC --tail 80 ----" >&2
                      timeout 15 docker service logs "$SVC" --tail 80 >&2 2>&1 || true
                      log "---- diag: docker service logs $PG_SVC --tail 40 ----" >&2
                      timeout 15 docker service logs "$PG_SVC" --tail 40 >&2 2>&1 || true
                      log "---- diag: curl -v http://localhost:3000 ----" >&2
                      timeout 5 curl -v http://localhost:3000 >&2 2>&1 || true
                      exit 1
                  fi
              fi
              # Old secret no longer referenced; safe to remove.
              if ! timeout 10 docker secret rm "$active_secret" >/dev/null 2>&1; then
                  log "WARN: could not remove old secret $active_secret (still in use by another service?)"
              else
                  log "OK: removed old secret $active_secret"
              fi
              changed=1
          fi

          # --- Phase 5: end-to-end probe ---
          # Strongest possible assertion: spawn a one-shot client on
          # dokploy-network and authenticate as `dokploy` against
          # dokploy-postgres over TCP using PGPASSWORD=$VAULT_PW.
          # This is exactly the path dokploy itself uses (TCP via
          # overlay network, pg_hba host-auth scram-sha-256). If
          # this passes, the dokploy app will authenticate.
          #
          # Re-resolve the pg consumer (secret rotation recreated the
          # task with a new container name) + re-wait pg_isready: the
          # earlier readiness check in Phase 2 referenced a task that
          # was killed during the secret swap. Without this we race
          # against postgres startup + the probe surfaces as
          # "could not connect" misreported as auth failure.
          pg_consumer=$(first_task "$PG_SVC")
          ready=0
          for _ in $(seq 1 30); do
              if [ -n "$pg_consumer" ] && \
                  timeout 5 docker exec "$pg_consumer" pg_isready -U dokploy >/dev/null 2>&1; then
                  ready=1
                  break
              fi
              sleep 2
              pg_consumer=$(first_task "$PG_SVC")
          done
          if [ "$ready" -ne 1 ]; then
              log "FAIL: $PG_SVC not pg_isready within 60s after secret rotation" >&2
              exit 1
          fi
          # Capture stderr so the real failure mode is visible
          # (psql errors never include PGPASSWORD; safe to log).
          probe_err=$(timeout 30 docker run --rm \
                  --network="$PROBE_NETWORK" \
                  -e PGPASSWORD="$VAULT_PW" \
                  "$PROBE_IMAGE" \
                  psql -h "$PG_SVC" -U dokploy -d postgres -c 'SELECT 1' 2>&1 >/dev/null) || probe_rc=$?
          if [ -n "${probe_rc:-}" ]; then
              log "FAIL: end-to-end probe -- vault password did NOT authenticate (rc=$probe_rc)" >&2
              log "      psql error: $probe_err" >&2
              log "      Vault -> swarm-secret -> pg_authid reconciliation left state inconsistent." >&2
              exit 1
          fi
          log "OK: end-to-end probe passed (vault authenticates over $PROBE_NETWORK)"

          [ "$changed" = 1 ] && log "CHANGED: reconciliation rotated state"
          exit 0
          {% endraw %}
        executable: /bin/bash
      environment:
        VAULT_PW: "{{ vault_dokploy_postgres_password }}"
      no_log: true
      register: _pg_reconcile
      changed_when: "'CHANGED:' in (_pg_reconcile.stdout | default(''))"
  always:
    # Slurp the tee'd log off the VPS and print it so the operator
    # gets diagnostics even when no_log: true censored the register
    # AND the VM is about to be torn down (test_bench end-cleanup).
    # The log file contains only log() status lines -- never
    # VAULT_PW -- so surfacing it is safe.
    - name: "pg-password: slurp /var/log/catena-pg-reconcile.log"
      ansible.builtin.slurp:
        src: /var/log/catena-pg-reconcile.log
      register: _pg_reconcile_logfile
      failed_when: false

    - name: "pg-password: print reconcile log (last 200 lines)"
      ansible.builtin.debug:
        msg: "{{ ((_pg_reconcile_logfile.content | b64decode).splitlines())[-200:] }}"
      when:
        - _pg_reconcile_logfile is defined
        - _pg_reconcile_logfile.content is defined
