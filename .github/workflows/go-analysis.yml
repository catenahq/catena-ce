name: Go analysis (govulncheck blocking, staticcheck report-only)

# Reachability-aware vuln scan (govulncheck only flags vulns your code
# actually calls -- far less noise than OSV/Trivy for Go) plus
# staticcheck correctness lint. govulncheck is BLOCKING: it currently
# fails on a reachable grpc finding (GO-2026-4762) until grpc is bumped
# (go.mod 1.61.0 -> >=1.79.3). staticcheck stays report-only. Go comes
# from ~/.local/go on the self-hosted runner (matches the CI workflow).

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '7 6 * * 1'

permissions:
  contents: read

jobs:
  go-analysis:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Put Go on PATH
        run: echo "$HOME/.local/go/bin" >> "$GITHUB_PATH"
      - name: govulncheck (blocking)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...
      - name: staticcheck (report-only)
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          set +e
          "$(go env GOPATH)/bin/staticcheck" ./...
          rc=$?
          set -e
          if [ $rc -ne 0 ]; then echo "::warning::staticcheck reported findings (report-only)."; fi
