name: OSV-Scanner

# Dependency-CVE gate (blocking), mirrored from catenahq/ops. Scans the Go
# module (go.mod/go.sum) recursively. Any vulnerability exits non-zero and
# fails the job; the baseline must stay clean.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '23 6 * * 1'

permissions:
  contents: read

jobs:
  scan:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: OSV-Scanner (latest user-space binary, no docker)
        run: |
          set -uo pipefail
          case "$(uname -m)" in
            x86_64) arch=amd64 ;;
            aarch64|arm64) arch=arm64 ;;
            *) echo "::error::unsupported arch $(uname -m)"; exit 1 ;;
          esac
          bindir="$HOME/.local/bin"; mkdir -p "$bindir"
          # Always fetch the latest release: the scanner self-updates with no
          # pin to maintain. On the persistent self-hosted runner the binary
          # and osv-scanner's vuln DB live under $HOME and are reused between
          # runs; ephemeral hosted runners just re-download (a small binary).
          curl -fsSL -o "$bindir/osv-scanner" \
            "https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_${arch}"
          chmod +x "$bindir/osv-scanner"
          # GitHub runs steps with `bash -e`; capture rc with -e OFF so the
          # no-lockfile case (osv-scanner exits 128, "No package sources
          # found") can be treated as green instead of aborting the step.
          set +e
          out=$("$bindir/osv-scanner" scan source --recursive . 2>&1); rc=$?
          set -e
          echo "$out"
          if [ "$rc" -ne 0 ] && printf '%s' "$out" | grep -q "No package sources found"; then
            echo "::notice ::OSV-Scanner found no lockfiles to scan -- treating as green."
            exit 0
          fi
          exit "$rc"
