name: OSV-Scanner

# Dependency-CVE gate (blocking), mirrored from catenahq/ops. Scans the Go
# module (go.mod/go.sum) recursively. Any vulnerability exits non-zero and
# fails the job; the baseline must stay clean.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '23 6 * * 1'

permissions:
  contents: read

jobs:
  scan:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: OSV-Scanner
        run: |
          docker run --rm -v "$PWD:/src" -w /src \
            ghcr.io/google/osv-scanner:v2.3.8 \
            scan source --recursive .
