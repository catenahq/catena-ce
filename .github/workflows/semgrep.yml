name: Semgrep

# SAST gate (blocking), mirrored from catenahq/ops with the Go rulesets
# in place of the Python ones. `--error` is the severity floor: only rules
# tagged ERROR fail the job; WARNING/INFO still surface in the summary but
# do not block. Tune via .semgrepignore + per-rule annotations.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '37 6 * * 1'

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: '3.14'

      - name: Scan
        run: |
          uvx semgrep scan \
            --config=p/golang \
            --config=p/owasp-top-ten \
            --config=p/dockerfile \
            --sarif \
            --output=semgrep.sarif \
            --metrics=off \
            --error \
            --verbose \
            .

      - name: Summarize
        if: always()
        run: |
          if [[ -f semgrep.sarif ]]; then
            COUNT=$(jq '[.runs[]?.results[]?] | length' semgrep.sarif 2>/dev/null || echo 0)
            echo "## Semgrep findings: $COUNT" >> "$GITHUB_STEP_SUMMARY"
            if [[ "$COUNT" != "0" ]]; then
              jq -r '.runs[]?.results[]? | "- [\(.level // "warning")] \(.ruleId) at \(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine)"' \
                semgrep.sarif >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
              echo "::warning::Semgrep found $COUNT issue(s) -- see semgrep.sarif artifact"
            fi
          fi

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: ignore
