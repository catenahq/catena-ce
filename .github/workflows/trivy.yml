name: Trivy

# Container-CVE + IaC + secret gate (blocking), mirrored from catenahq/ops.
# fs scan walks the repo: Go lockfile CVEs, misconfig, and embedded
# secrets (HIGH/CRITICAL, ignore-unfixed so unpatched CVEs do not block
# until a fix exists upstream). Tune via .trivyignore. The catena-admin
# image scan is added in M1.2 once the Dockerfile lands here.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '43 6 * * 1'

permissions:
  contents: read

jobs:
  trivy-fs:
    name: Trivy fs (repo)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: 'json'
          output: 'trivy-fs.json'
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: trivy-fs-report
          path: trivy-fs.json
          if-no-files-found: ignore
