name: CI

# Go build/vet/test gate for the catena-admin shell + license/plugin libs,
# plus the Python installer (ansible/) unit tests. Runs on the self-hosted
# laptop runner; Go comes from ~/.local/go (the same toolchain used locally)
# rather than setup-go, and Python tooling comes from uv.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go build + vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Put Go on PATH
        run: |
          echo "$HOME/.local/go/bin" >> "$GITHUB_PATH"
      - name: Toolchain
        run: go version
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Staticcheck (report-only)
        # Correctness lint folded in from the retired go-analysis.yml.
        # govulncheck (the blocking half of that workflow) now runs via
        # the scanctl security gate; staticcheck is not a scanctl tool.
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          set +e
          "$(go env GOPATH)/bin/staticcheck" ./...
          rc=$?
          set -e
          if [ $rc -ne 0 ]; then echo "::warning::staticcheck reported findings (report-only)."; fi

  installer:
    name: Installer (Python) tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      # The installer tests import only seed.py + helpers (no ansible-core), so
      # run them in a lightweight ephemeral env instead of syncing the project
      # (which would pull ansible-core for nothing here).
      - name: Unit tests
        working-directory: ansible
        run: uv run --no-project --with pytest --with pyyaml python -m pytest tests/unit -q
