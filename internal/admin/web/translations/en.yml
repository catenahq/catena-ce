app:
  name: "Catena Admin"
  tagline: "Per-VPS operator panel"

tabs:
  apps: "Apps"
  access: "Access"
  system: "System"
  daily: "Daily"
  maintenance: "Maintenance"
  resources: "Resources"
  actions: "Actions"
  recovery: "Recovery"
  clients: "Clients"

resources:
  heading: "Resource usage"
  intro: "Per-container and per-host CPU, memory, network, disk, temperature and load history with threshold alerting, served by the Beszel monitor. The embedded view below is the full hub; open it in a new tab for the multi-day charts."
  open_hub: "Open resource monitor"
  disabled: "Resource monitoring is not enabled on this host. Set BESZEL_ENABLED=true and converge to deploy the Beszel hub + agent."

daily:
  heading: "Daily orchestrator"
  intro: "Sequenced nightly chain: preflight, backup, verify hot, restic check, cold mirror, verify cold, security updates, CVE residual, package check, container update."
  current_state: "Current state"
  badges:
    heading: "Per-stage badges"
  history:
    heading: "Last 7 runs"
    empty: "No runs recorded yet."
    col:
      ts: "Timestamp"
      terminal: "Terminal state"
      status: "Status"

maintenance:
  heading: "Maintenance log"
  intro: "Chronological record of the work done to keep the platform up to date and secure: backups, updates, and security decisions."
  empty: "No maintenance activity recorded yet."
  col:
    ts: "Timestamp"
    event: "Event"
  event:
    backup_ok: "Backup completed at {time}. Size {size} ({delta})."
    security_update_applied: "Security updates installed."
    packages_pending: "{count} non-security update(s) available; scheduled for the next maintenance window."
    container_updated: "{app} updated from {from_v} to {to_v}."
    container_rolled_back: "{app} update to {version} failed its health check and was rolled back."
    cve_detected_host: "{count} security advisory(ies) flagged in host packages; tracked for the next update cycle."
    cve_detected_image: "{count} security advisory(ies) flagged in application images; tracked for the next update cycle."
    cve_cleared_host: "Security advisories in host packages cleared."
    cve_cleared_image: "Security advisories in application images cleared."
    _unknown: "Maintenance activity recorded."

