access:
  heading: "Access"
  hint: "Read-only view of which group can reach which app. catena-admin shows access; edit users and groups in Keycloak. An app reaches a group when that group is in its allowed set; admin always reaches everything; public apps reach everyone including anonymous visitors."
  edit_in_keycloak: "Edit users & groups in Keycloak"
  empty: "No apps discovered yet. Deploy apps in Dokploy and they appear here with their resolved access posture."
  col:
    group: "Group"
  cell:
    reachable: "reachable"
    unreachable: "not reachable"
  tier:
    visitor: "Visitor (anonymous)"
    client: "Client"
    staff: "Staff"
    admin: "Admin"
  posture:
    public: "public"
    restricted: "restricted"
    admin-only: "admin-only"
    deny: "deny"
  badge:
    protected: "protected"
  warnings:
    heading: "Guardrail"
    public_protected: "Marked vps.auth.protected=true but resolves to PUBLIC -- anyone can reach it without logging in. Add vps.auth.groups or remove the public mode."
    public_sensitive: "A sensitive surface resolves to PUBLIC -- it should be gated. Set vps.auth.mode=admin-only or list vps.auth.groups."
